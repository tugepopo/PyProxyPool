# A generic, single database configuration.

[alembic]
script_location = .
prepend_sys_path = ..
output_encoding = utf-8
version_path_separator = os  # Use os.path.sep

# 注意：Alembic 使用同步引擎，所以这里使用同步连接字符串
# SQLite 模式下使用 sqlite:/// 路径，PostgreSQL 模式下使用 postgresql://
sqlalchemy.url = sqlite:///data/proxy.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S